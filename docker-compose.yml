version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    # You can also use the pre-built image from Docker Hub:
    # image: EmberlyOSS/Website:latest
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://emberly:emberlypassword@postgres:5432/emberly?schema=public
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=your-secret-key-here
    volumes:
      - uploads:/app/uploads
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      - POSTGRES_USER=emberly
      - POSTGRES_PASSWORD=emberlypassword
      - POSTGRES_DB=emberly
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  uploads: 