name: Docker Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  docker-build-test:
    name: Docker Build Test (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    permissions:
      contents: read
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate platform tag suffix
        id: generate_tag
        run: |
          platform="${{ matrix.platform }}"
          echo "TAG_SUFFIX=${platform//\//-}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: false
          load: true
          tags: emberly:test-${{ steps.generate_tag.outputs.TAG_SUFFIX }}
          cache-from: type=gha,scope=${{ github.workflow }}-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ github.workflow }}-${{ matrix.platform }}

      - name: Test Docker container
        run: |
          # Create network
          docker network create emberly-network

          # Start PostgreSQL
          docker run -d --name postgres \
            --network emberly-network \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=emberly_test \
            postgres:16

          # Wait for PostgreSQL to be ready
          timeout=30
          while [ $timeout -gt 0 ]; do
            if docker exec postgres pg_isready -U postgres; then
              break
            fi
            sleep 1
            timeout=$((timeout-1))
          done
          if [ $timeout -eq 0 ]; then
            echo "PostgreSQL failed to become ready"
            exit 1
          fi

          # Run migrations
          docker run --rm \
            --network emberly-network \
            -e DATABASE_URL=postgresql://postgres:postgres@postgres:5432/emberly_test \
            emberly:test-${{ steps.generate_tag.outputs.TAG_SUFFIX }} \
            npx prisma migrate deploy

          # Start the application
          docker run --name emberly-test -d \
            -e DATABASE_URL=postgresql://postgres:postgres@postgres:5432/emberly_test \
            -e NEXTAUTH_SECRET=test-secret \
            -e NEXTAUTH_URL=http://localhost:3000 \
            --network emberly-network \
            emberly:test-${{ steps.generate_tag.outputs.TAG_SUFFIX }}
          
          # Wait for container to be healthy
          timeout=60
          while [ $timeout -gt 0 ]; do
            if docker inspect emberly-test --format='{{.State.Health.Status}}' | grep -q healthy; then
              echo "Container is healthy"
              exit 0
            fi
            sleep 1
            timeout=$((timeout-1))
          done
          echo "Container failed to become healthy"
          docker logs emberly-test
          exit 1

      - name: Cleanup
        if: always()
        run: |
          docker stop emberly-test postgres || true
          docker rm emberly-test postgres || true
          docker network rm emberly-network || true 